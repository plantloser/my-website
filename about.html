<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="/js/script.js"></script>


</head>
<body>
    <div class="container"></div>
        <header>
        <h1>The About Page</h1>
    </header>
    <p>This is the about page.</p>
    <section>   
    <nav>
        <ul>
             <a href="index.html">Home</a>
        </ul>
    </section>
    <section>
        <form method="post" action="https://webdevbasics.net/scripts/demo.php">
            <div class="mb-3">
                <label for="myName"class="form-label">Name:</label>
                <input type="text" id="myName" name="myName"class="form-control">
            </div>
            <div class="mb-3">
                <label id="emailBox" onmouseover="emailMessage()" onmouseout="blankMessage()" for="myEmail" class="form-label">Email:</label>
                <input type="email" id="myEmail" name="myEmail" class="form-control">
            </div>
            Choose the browser you use<br>
            <div class="mb-3 form-check">
                <input type="checkbox" id="go" name="go" value="yes"class="form-check-input">
                <label for="go" class="form-check-label">Google Chrome</label><br>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" id="firefox" name="firefox" value="yes"class="form-check-input">
                <label for="firefox" class="form-check-label">Firefox</label><br>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" id="edge" name="edge" value="yes" class="form-check-input">
                <label for="edge"class="form-check-label">Microsoft Edge</label><br>
            </div>
            Would you like to be on our mailing list?<br>
           <div class="mb-3">
                <div class="form-check"> 
                    <input type="radio" name="mailingList" value="yes" class="form-check-input">
                    <label for="yes" class="form-check-label">Yes</label><br>
                </div>
                <div class="form-check">
                    <input type="radio" name="mailingList" value="no" class="form-check-input">
                    <label for="no">No</label><br>
                </div>
            </div>
            <div class="mb-3 input-group">
                <span class="input-group-text">Comments:</span>
                <textarea class="form-control" aria-label="Comments"></textarea>
            </div>
            <input type="submit" value="Submit" class="btn btn-primary">
            <input type="reset" class="btn btn-secondary">
        </form>
    </section>
    </div>
</body>
</html>
