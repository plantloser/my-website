<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
</head>
<body>
    <header>
        <h1>The About Page</h1>
    </header>
    <p>This is the about page.</p>
    <section>   
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </section>
    <section>
        <form method="post" action="https://webdevbasics.net/scripts/demo.php">
            <div>
                <label for="myName">Name:</label>
                <input type="text" id="myName" name="myName">
            </div>
            <div>
                <label for="myEmail">Email:</label>
                <input type="email" id="myEmail" name="myEmail">
            </div>
            Choose the browser you use<br>
            <div>
                <input type="checkbox" id="go" name="go" value="yes">
                <label for="go">Google Chrome</label><br>
            </div>
            <div>
                <input type="checkbox" id="firefox" name="firefox" value="yes">
                <label for="firefox">Firefox</label><br>
            </div>
            <div>
                <input type="checkbox" id="edge" name="edge" value="yes">
                <label for="edge">Microsoft Edge</label><br>
            </div>
            Would you like to be on our mailing list?<br>
           <div>
                <div> 
                    <input type="radio" name="mailingList" value="yes">
                    <label for="yes">Yes</label><br>
                </div>
                <div>
                    <input type="radio" name="mailingList" value="no">
                    <label for="no">No</label><br>
                </div>
            </div>
            <div>
                <span>Comments:</span>
                <textarea></textarea>
            </div>
            <input type="submit" value="Submit">
            <input type="reset">
        </form>
    </section>
</body>
</html>
